<script>
'use strict';

/* ═══════════════════════════════════════════════
   1. VOWEL / TONE TABLES
   ═══════════════════════════════════════════════ */

const TONE_VOWEL_INFO = {
  'ā':{base:'a',tone:1},'á':{base:'a',tone:2},'ǎ':{base:'a',tone:3},'à':{base:'a',tone:4},
  'ē':{base:'e',tone:1},'é':{base:'e',tone:2},'ě':{base:'e',tone:3},'è':{base:'e',tone:4},
  'ī':{base:'i',tone:1},'í':{base:'i',tone:2},'ǐ':{base:'i',tone:3},'ì':{base:'i',tone:4},
  'ō':{base:'o',tone:1},'ó':{base:'o',tone:2},'ǒ':{base:'o',tone:3},'ò':{base:'o',tone:4},
  'ū':{base:'u',tone:1},'ú':{base:'u',tone:2},'ǔ':{base:'u',tone:3},'ù':{base:'u',tone:4},
  'ǖ':{base:'v',tone:1},'ǘ':{base:'v',tone:2},'ǚ':{base:'v',tone:3},'ǜ':{base:'v',tone:4},
};

const VOWEL_AT_TONE = {
  a:{0:'a',1:'ā',2:'á',3:'ǎ',4:'à',5:'a'},
  e:{0:'e',1:'ē',2:'é',3:'ě',4:'è',5:'e'},
  i:{0:'i',1:'ī',2:'í',3:'ǐ',4:'ì',5:'i'},
  o:{0:'o',1:'ō',2:'ó',3:'ǒ',4:'ò',5:'o'},
  u:{0:'u',1:'ū',2:'ú',3:'ǔ',4:'ù',5:'u'},
  v:{0:'ü',1:'ǖ',2:'ǘ',3:'ǚ',4:'ǜ',5:'ü'},
};

/* ═══════════════════════════════════════════════
   2. UTILITIES
   ═══════════════════════════════════════════════ */

function toneFromNum(s) {
  if (!s) return 0;
  const m = s.match(/(\d)$/);
  return m ? parseInt(m[1]) : 0;
}

function changeToneSymbol(syllable, newTone) {
  for (let i = 0; i < syllable.length; i++) {
    const info = TONE_VOWEL_INFO[syllable[i]];
    if (info) {
      return syllable.slice(0, i) + (VOWEL_AT_TONE[info.base][newTone] ?? syllable[i]) + syllable.slice(i + 1);
    }
  }
  return syllable;
}

function changeToneNum(s, t) { return s.replace(/\d$/, String(t)); }

function isChinese(ch) {
  const cp = ch.codePointAt(0);
  return (cp >= 0x4E00 && cp <= 0x9FFF) || (cp >= 0x3400 && cp <= 0x4DBF)
      || (cp >= 0x20000 && cp <= 0x2A6DF) || (cp >= 0xF900 && cp <= 0xFAFF);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ═══════════════════════════════════════════════
   3. PINYIN-PRO INIT
   ═══════════════════════════════════════════════ */

let pinyinFn = null;

function tryInitLib() {
  if (typeof pinyinPro !== 'undefined' && typeof pinyinPro.pinyin === 'function') {
    pinyinFn = pinyinPro.pinyin.bind(pinyinPro);
    return true;
  }
  return false;
}

/* ═══════════════════════════════════════════════
   4. PINYIN CONVERSION + SANDHI
   ═══════════════════════════════════════════════ */

function convertText(text) {
  if (!pinyinFn || !text) return [];
  const chars = [...text];

  let symArr, numArr;
  try {
    symArr = pinyinFn(text, { type:'array', toneType:'symbol', mode:'normal', nonZh:'preserve' });
    numArr = pinyinFn(text, { type:'array', toneType:'num',    mode:'normal', nonZh:'preserve' });
  } catch(e) {
    console.error('pinyin-pro:', e);
    return chars.map(ch => ({ char:ch, symbol:'', num:'', isZh:isChinese(ch),
      isSpace:ch===' '||ch==='\u3000', isNl:ch==='\n', sandhiChanged:false }));
  }

  const len = chars.length;
  while (symArr.length < len) symArr.push('');
  while (numArr.length < len) numArr.push('');

  const sandhiIdx = new Set();

  // Rule 1: 不 sandhi
  for (let i = 0; i < len - 1; i++) {
    if (chars[i] === '不' && isChinese(chars[i+1])) {
      if (toneFromNum(numArr[i+1]) === 4) {
        symArr[i] = changeToneSymbol(symArr[i], 2);
        numArr[i] = changeToneNum(numArr[i], 2);
        sandhiIdx.add(i);
      }
    }
  }

  // Rule 2: 一 sandhi
  for (let i = 0; i < len; i++) {
    if (chars[i] !== '一') continue;
    const prev = i > 0 ? chars[i-1] : '';
    if (prev === '第' || prev === '初' || prev === '正') continue;
    if (i < len - 1 && isChinese(chars[i+1])) {
      const t = toneFromNum(numArr[i+1]);
      if (t === 4) {
        symArr[i] = 'yí'; numArr[i] = 'yi2'; sandhiIdx.add(i);
      } else if (t >= 1 && t <= 3) {
        symArr[i] = 'yì'; numArr[i] = 'yi4'; sandhiIdx.add(i);
      }
    }
  }

  // Rule 3: Third-tone sandhi (left→right)
  for (let i = 0; i < len - 1; i++) {
    if (!isChinese(chars[i]) || !isChinese(chars[i+1])) continue;
    if (toneFromNum(numArr[i]) === 3 && toneFromNum(numArr[i+1]) === 3) {
      symArr[i] = changeToneSymbol(symArr[i], 2);
      numArr[i] = changeToneNum(numArr[i], 2);
      sandhiIdx.add(i);
    }
  }

  return chars.map((ch, i) => ({
    char: ch,
    symbol: symArr[i] || '',
    num:    numArr[i] || '',
    isZh:   isChinese(ch),
    isSpace: ch === ' ' || ch === '\u3000',
    isNl:    ch === '\n',
    sandhiChanged: sandhiIdx.has(i),
  }));
}

/* ═══════════════════════════════════════════════
   5. RENDER PINYIN
   ═══════════════════════════════════════════════ */

let currentMode = 'symbol';
let currentData = [];

function setMode(mode) {
  currentMode = mode;
  document.getElementById('btn-symbol').classList.toggle('active', mode === 'symbol');
  document.getElementById('btn-num').classList.toggle('active', mode === 'num');
  renderOutput(currentData);
}

function renderOutput(data) {
  const out = document.getElementById('output');
  const hasZh = data && data.some(d => d.isZh);

  setSpeakEnabled(hasZh);
  document.getElementById('btn-copy').disabled = !hasZh;

  if (!data || !data.length) {
    out.innerHTML = '<div class="placeholder-msg">テキストを入力するとピンインが表示されます</div>';
    return;
  }

  const html = data.map(item => {
    if (item.isNl)    return '<span class="cb is-nl" aria-hidden="true"></span>';
    if (item.isSpace) return '<span class="cb is-space" aria-hidden="true"></span>';

    const py = currentMode === 'symbol' ? item.symbol : item.num;
    const pyHtml = (py && item.isZh) ? escHtml(py) : '';
    const dot = (item.sandhiChanged && pyHtml)
      ? '<span class="sandhi-dot" title="変調あり"></span>' : '';
    const cls = item.isZh ? 'cb' : 'cb non-zh';

    return `<span class="${cls}"><span class="cb-py">${pyHtml}${dot}</span><span class="cb-ch">${escHtml(item.char)}</span></span>`;
  }).join('');

  out.innerHTML = `<div class="py-display">${html}</div>`;
}

/* ═══════════════════════════════════════════════
   6. COPY PINYIN
   ═══════════════════════════════════════════════ */

function copyPinyin() {
  if (!currentData.length) return;

  // Build a clean pinyin-only string: syllables separated by spaces,
  // newlines preserved, non-Chinese chars skipped
  const parts = [];
  for (const item of currentData) {
    if (item.isNl) { parts.push('\n'); continue; }
    if (!item.isZh) continue; // skip spaces and punctuation
    const py = currentMode === 'symbol' ? item.symbol : item.num;
    if (py) parts.push(py);
  }
  const text = parts.join(' ').replace(/ *\n */g, '\n').trim();

  navigator.clipboard.writeText(text).then(() => {
    const btn   = document.getElementById('btn-copy');
    const label = document.getElementById('copy-label');
    btn.classList.add('copied');
    label.textContent = 'コピー完了！';
    setTimeout(() => {
      btn.classList.remove('copied');
      label.textContent = 'ピンインをコピー';
    }, 1600);
  }).catch(err => {
    console.warn('clipboard error:', err);
    // Fallback: select text
    alert('コピーできませんでした。手動でコピーしてください。');
  });
}

/* ═══════════════════════════════════════════════
   7. INPUT HANDLER
   ═══════════════════════════════════════════════ */

let debounceTimer = null;

document.getElementById('txt-input').addEventListener('input', function () {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    if (!pinyinFn && !tryInitLib()) {
      document.getElementById('output').innerHTML =
        '<div class="loading-msg">ライブラリ読み込み中…</div>';
      return;
    }
    const text = this.value;
    currentData = text ? convertText(text) : [];
    renderOutput(currentData);
  }, 120);
});

/* ═══════════════════════════════════════════════
   8. SPEECH SYNTHESIS
   ═══════════════════════════════════════════════ */

let voices = [];

function loadVoices() {
  const v = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
  if (v.length) voices = v;
}

if (window.speechSynthesis) {
  loadVoices();
  window.speechSynthesis.addEventListener('voiceschanged', loadVoices);
}

function getZhVoice() {
  return voices.find(v => v.lang === 'zh-CN')
      || voices.find(v => v.lang.startsWith('zh-CN'))
      || voices.find(v => v.lang.startsWith('zh'))
      || null;
}

function setSpeakEnabled(enabled) {
  const btn = document.getElementById('btn-speak');
  if (!btn.classList.contains('speaking'))
    btn.disabled = !enabled || !window.speechSynthesis;
}

function speak() {
  const text = document.getElementById('txt-input').value.trim();
  if (!text || !window.speechSynthesis) return;

  window.speechSynthesis.cancel();

  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'zh-CN';
  utt.rate = 0.88;
  utt.pitch = 1.0;

  loadVoices();
  const voice = getZhVoice();
  if (voice) utt.voice = voice;

  const btn   = document.getElementById('btn-speak');
  const label = document.getElementById('speak-label');
  btn.classList.add('speaking');
  btn.disabled = true;
  label.textContent = '読み上げ中';

  function onEnd() {
    btn.classList.remove('speaking');
    label.textContent = '読み上げ';
    btn.disabled = !currentData.some(d => d.isZh);
  }

  utt.onend = onEnd;
  utt.onerror = e => { if (e.error !== 'interrupted') console.warn('Speech error:', e.error); onEnd(); };

  setTimeout(() => window.speechSynthesis.speak(utt), 60);
}

/* ═══════════════════════════════════════════════
   9. SIMPLIFIER (opencc-js)
   ═══════════════════════════════════════════════ */

let convTW = null; // 繁体字 → 简体字
let convJP = null; // 日本語漢字 → 简体字
let simpMode = 'tw'; // current simplifier source

function tryInitOpenCC() {
  if (typeof OpenCC === 'undefined') return false;
  try {
    if (!convTW) convTW = OpenCC.Converter({ from: 'tw', to: 'cn' });
    if (!convJP) convJP = OpenCC.Converter({ from: 'jp', to: 'cn' });
    return true;
  } catch(e) {
    console.error('OpenCC init error:', e);
    return false;
  }
}

function setSimpMode(mode) {
  simpMode = mode;
  document.getElementById('simp-btn-tw').classList.toggle('active', mode === 'tw');
  document.getElementById('simp-btn-jp').classList.toggle('active', mode === 'jp');
  // Re-convert current input
  runSimplify(document.getElementById('simp-input').value);
}

function runSimplify(text) {
  const resultEl = document.getElementById('simp-result');
  const copyBtn  = document.getElementById('btn-simp-copy');

  if (!text.trim()) {
    resultEl.textContent = '変換結果がここに表示されます';
    resultEl.className = 'simp-result empty';
    copyBtn.disabled = true;
    return;
  }

  if (!tryInitOpenCC()) {
    resultEl.textContent = 'ライブラリ読み込み中…しばらくお待ちください';
    resultEl.className = 'simp-result empty';
    return;
  }

  try {
    const converter = simpMode === 'jp' ? convJP : convTW;
    const converted = converter(text);
    resultEl.textContent = converted;
    resultEl.className = 'simp-result';
    copyBtn.disabled = false;
  } catch(e) {
    console.error('OpenCC convert error:', e);
    resultEl.textContent = '変換中にエラーが発生しました';
    resultEl.className = 'simp-result empty';
    copyBtn.disabled = true;
  }
}

let simpDebounce = null;

document.getElementById('simp-input').addEventListener('input', function () {
  clearTimeout(simpDebounce);
  simpDebounce = setTimeout(() => runSimplify(this.value), 150);
});

function copySimpResult() {
  const text = document.getElementById('simp-result').textContent;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn   = document.getElementById('btn-simp-copy');
    const label = document.getElementById('simp-copy-label');
    btn.classList.add('copied');
    label.textContent = 'コピー完了！';
    setTimeout(() => {
      btn.classList.remove('copied');
      label.textContent = 'コピー';
    }, 1600);
  }).catch(() => alert('コピーできませんでした。'));
}

/* ═══════════════════════════════════════════════
   10. INIT ON LOAD
   ═══════════════════════════════════════════════ */

window.addEventListener('load', () => {
  tryInitLib();
  tryInitOpenCC();

  const existing = document.getElementById('txt-input').value;
  if (existing && pinyinFn) {
    currentData = convertText(existing);
    renderOutput(currentData);
  }

  // Poll if libraries haven't loaded yet
  if (!pinyinFn || !convTW) {
    let polls = 0;
    const iv = setInterval(() => {
      polls++;
      const pyOk  = pinyinFn  || tryInitLib();
      const ocOk  = convTW    || tryInitOpenCC();
      if ((pyOk && ocOk) || polls > 40) {
        clearInterval(iv);
        const v = document.getElementById('txt-input').value;
        if (v && pinyinFn && !currentData.length) {
          currentData = convertText(v);
          renderOutput(currentData);
        }
      }
    }, 250);
  }
});
</script>
